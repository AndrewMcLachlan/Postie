version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 10
    groups:
      microsoft:
        patterns:
          - "Microsoft.*"
      testing:
        patterns:
          - "xunit*"
          - "coverlet*"
          - "*.Test.Sdk"
    ignore:
      # 12.x is the last Apache-2.0 MediatR line; 13+ is commercially licensed. Never auto-bump the major.
      - dependency-name: "MediatR"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
