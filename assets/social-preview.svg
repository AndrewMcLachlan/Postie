<?xml version="1.0" encoding="UTF-8"?>
<!-- Postie social preview (GitHub Settings -> General -> Social preview; 1280x640).
     Source of truth for social-preview.png — re-export after any change.
     Text uses the Outfit typeface (https://fonts.google.com/specimen/Outfit, SIL OFL):
     wordmark = Outfit Bold (700), taglines = Outfit Medium (500). Install locally before editing. -->
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">

  <!-- Ground -->
  <rect id="background" width="1280" height="640" fill="#FAF6F2"/>

  <!-- Icon tile (geometry = icon.svg scaled 128 -> 300) -->
  <g id="icon-tile">
    <rect x="130" y="170" width="300" height="300" rx="65.6" fill="#FF5800"/>
    <circle cx="242.5" cy="320" r="58.6" fill="none" stroke="#FFFFFF" stroke-width="21.1"/>
    <circle cx="242.5" cy="320" r="16.4" fill="#FFFFFF"/>
    <line x1="326.9" y1="284.9" x2="378.4" y2="284.9" stroke="#FFFFFF" stroke-width="21.1" stroke-linecap="round"/>
    <line x1="326.9" y1="320"   x2="392.5" y2="320"   stroke="#FFFFFF" stroke-width="21.1" stroke-linecap="round"/>
    <line x1="326.9" y1="355.1" x2="364.4" y2="355.1" stroke="#FFFFFF" stroke-width="21.1" stroke-linecap="round"/>
  </g>

  <!-- Wordmark + taglines -->
  <g id="text" font-family="Outfit">
    <text id="wordmark" x="510" y="290" font-size="120" font-weight="700" fill="#2B2119">Postie</text>
    <text id="tagline-1" x="514" y="390" font-size="33" font-weight="500" fill="#2B2119">CQRS, delivered straight to minimal API endpoints.</text>
    <text id="tagline-2" x="514" y="438" font-size="33" font-weight="500" fill="#7A6C62">Bring your own mediator. MIT, free forever.</text>
  </g>
</svg>
